<title>Boticário · Ludmilla</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --tinta: #2B2024;
    --rose: #B76E79;
    --rose-2: #C9957A;
    --rose-claro: #E8C4C4;
    --champagne: #C9A86A;
    --creme: #FBF8F5;
    --cartao: #FFFFFF;
    --linha: #EDE6E2;
    --cinza: #9A8E8E;
    --cinza-2: #6B5E5E;
    --verde: #4E8F6D;
    --verde-bg: #EDF5F0;
    --vinho: #B5485B;
    --vinho-bg: #FBEEF0;
    --ambar: #C98A3A;
    --ambar-bg: #FBF2E6;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--creme); color: var(--tinta); min-height: 100vh; padding: 0 0 92px; }
  header { background: var(--tinta); color: #fff; padding: 20px 20px 22px; }
  .marca { display: flex; align-items: center; justify-content: space-between; }
  .marca .nome { font-family: Georgia, serif; font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; }
  .marca .nome b { color: var(--champagne); font-weight: 600; }
  .sync { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: #B8AEAE; }
  .sync .dot { width: 7px; height: 7px; border-radius: 50%; background: #66756C; }
  .sync.on .dot { background: #7FD7A8; }
  .resumo-topo { display: flex; gap: 10px; margin-top: 18px; }
  .rt { flex: 1; background: rgba(255,255,255,0.07); border-radius: 12px; padding: 11px 12px; }
  .rt .l { font-size: 10px; color: #B8AEAE; letter-spacing: 0.5px; text-transform: uppercase; }

  function abrirModalProduto() {

  window.editarProduto = function(id) {

    document.getElementById('pNome').value = p.nome || '';
    document.getElementById('pCategoria').value = p.categoria || '';

  };
  // ===== CÁLCULOS (regra da Ludmilla) =====
  // Lucro = 20% do custo (preço da dona) + o que ela acrescentou (venda - custo)
  // Devolve pra fornecedora = custo - 20% do custo
  const COMISSAO = 0.20;
  function calcLucro(custo, venda) { return (custo * COMISSAO) + (venda - custo); }
  function calcDevolve(custo) { return custo - (custo * COMISSAO); }

  window.previaLucro = function() {
    const custo = parseFloat(document.getElementById('pCusto').value) || 0;
    const venda = parseFloat(document.getElementById('pVenda').value) || 0;
    const el = document.getElementById('previaLucro');
    if (custo > 0 || venda > 0) {
      const lucro = calcLucro(custo, venda);
      const devolve = calcDevolve(custo);
      el.innerHTML = 'Seu lucro: <b>' + fmt(lucro) + '</b> · Devolve à fornecedora: <b>' + fmt(devolve) + '</b>';
      el.classList.add('show');
    } else { el.classList.remove('show'); }
  };
  window.salvarProduto = function() {
    const nome = document.getElementById('pNome').value.trim();
    const categoria = document.getElementById('pCategoria').value.trim();
    const qtd = parseInt(document.getElementById('pQtd').value) || 0;
    const min = parseInt(document.getElementById('pMin').value) || 0;
    const custo = parseFloat(document.getElementById('pCusto').value) || 0;
    const venda = parseFloat(document.getElementById('pVenda').value) || 0;
    if (!nome) { alert('Digite o nome do produto.'); return; }
    const dados = { nome, categoria, qtd, min, custo, venda };
    if (editandoProduto) prodRef.child(editandoProduto).update(dados);
    else prodRef.push({ ...dados, criado: Date.now() });
    fecharModais();
  };

  function abrirModalVenda(idPreSelecionado) {

    sel.innerHTML = ids.map(id => '<option value="' + id + '">' + esc(produtos[id].nome) + ' (' + (produtos[id].qtd||0) + ' em estoque)</option>').join('');
    if (idPreSelecionado && produtos[idPreSelecionado]) sel.value = idPreSelecionado;
    document.getElementById('vQtd').value = 1;
    document.getElementById('vCliente').value = '';
    setPagVenda('pago');
    atualizaPrecoVenda();
    document.getElementById('modalVenda').classList.add('aberto');
  }
  // Vender direto tocando no produto do estoque
  window.venderProduto = function(id) {
    if ((produtos[id].qtd||0) <= 0) {
      if (!confirm('"' + produtos[id].nome + '" está sem estoque.\n\nQuer registrar a venda mesmo assim?')) return;
    }
    abrirModalVenda(id);
  };
  window.atualizaPrecoVenda = function() {
    const id = document.getElementById('vProduto').value;
    const qtd = parseInt(document.getElementById('vQtd').value) || 1;
    if (produtos[id]) document.getElementById('vValor').value = ((produtos[id].venda||0) * qtd).toFixed(2);
  };
  window.setPagVenda = function(p) {
    pagVenda = p;
    document.getElementById('btnPago').className = p === 'pago' ? 'sel-pago' : '';
    document.getElementById('btnFiado').className = p === 'fiado' ? 'sel-fiado' : '';
  };
  window.salvarVenda = function() {
    const id = document.getElementById('vProduto').value;
    const qtd = parseInt(document.getElementById('vQtd').value) || 0;
    const valor = parseFloat(document.getElementById('vValor').value) || 0;
    const cliente = document.getElementById('vCliente').value.trim();
    if (!produtos[id]) { alert('Escolha um produto.'); return; }
    if (qtd <= 0) { alert('Quantidade inválida.'); return; }
    if (qtd > (produtos[id].qtd||0)) { if (!confirm('Você só tem ' + (produtos[id].qtd||0) + ' em estoque. Registrar mesmo assim?')) return; }
    const custoUnit = produtos[id].custo || 0;
    const vendaUnit = produtos[id].venda || 0;
    const lucroTotal = calcLucro(custoUnit, vendaUnit) * qtd;
    const devolveTotal = calcDevolve(custoUnit) * qtd;
    // baixa do estoque
    const novaQtd = Math.max(0, (produtos[id].qtd||0) - qtd);
    prodRef.child(id).update({ qtd: novaQtd });
    // registra venda (guarda lucro e valor a devolver para os acertos)
    vendaRef.push({ produtoId: id, produtoNome: produtos[id].nome, qtd, valor, custo: custoUnit * qtd, lucro: lucroTotal, devolve: devolveTotal, cliente, pago: pagVenda === 'pago', data: new Date().toISOString().slice(0,10), criado: Date.now() });

    setAba('vendas');
  };

  // ---- RENDER ----
  function render() {
    // Resumo topo
    let valEstoque = 0, lucroPrev = 0;
    Object.values(produtos).forEach(p => {
      valEstoque += (p.custo||0) * (p.qtd||0);
      lucroPrev += calcLucro(p.custo||0, p.venda||0) * (p.qtd||0);
    });
    let aReceber = 0;
    Object.values(vendas).forEach(v => { if (!v.pago) aReceber += (v.valor||0); });
    document.getElementById('rtEstoque').textContent = fmtCurto(valEstoque);
    document.getElementById('rtLucro').textContent = fmtCurto(lucroPrev);
    document.getElementById('rtReceber').textContent = fmtCurto(aReceber);

    renderEstoque(); renderVendas(); renderReceber(); renderEncomendas(); renderAcertos();
  }

  function renderEstoque() {
    // Preenche o datalist de categorias existentes
    const cats = [...new Set(Object.values(produtos).map(p => p.categoria).filter(Boolean))].sort();
    document.getElementById('listaCategorias').innerHTML = cats.map(c => '<option value="' + esc(c) + '">').join('');
    // Ordena por categoria e depois por nome
    const ids = Object.keys(produtos).sort((a,b) => {
      const ca = (produtos[a].categoria||'zzz'), cb = (produtos[b].categoria||'zzz');
      if (ca !== cb) return ca.localeCompare(cb);
      return (produtos[a].nome||'').localeCompare(produtos[b].nome||'');
    });
    document.getElementById('contProdutos').textContent = ids.length ? ids.length + ' produtos' : '';
    const dica = document.getElementById('dicaVenda');
    if (dica) dica.style.display = ids.length ? 'block' : 'none';
    const el = document.getElementById('listaEstoque');
    if (ids.length === 0) { el.innerHTML = '<div class="vazio"><span class="ic">📦</span>Nenhum produto ainda.<br>Toque em "Novo produto" para começar.</div>'; return; }
    el.innerHTML = ids.map(id => {
      const p = produtos[id], qtd = p.qtd||0, min = p.min||0;
      const lucro = calcLucro(p.custo||0, p.venda||0);
      let classe = 'qtd-badge';
      if (qtd === 0) classe += ' zero'; else if (qtd <= min) classe += ' baixo';
      return '<div class="card prod">' +
        '<div class="area-venda" onclick="venderProduto(\'' + id + '\')">' +
        '<div class="' + classe + '"><span class="n">' + qtd + '</span><span class="u">un</span></div>' +
        '<div class="info"><div class="nome">' + esc(p.nome) + '</div>' +
        (p.categoria ? '<div class="precos" style="color:var(--rose);font-weight:600;">' + esc(p.categoria) + '</div>' : '') +
        '<div class="precos">Custo ' + fmt(p.custo||0) + ' · Venda ' + fmt(p.venda||0) + '</div>' +
        '<div class="lucro">Lucro ' + fmt(lucro) + ' por unidade</div></div>' +
        '<div class="seta">›</div></div>' +
        '<div class="acoes"><button onclick="editarProduto(\'' + id + '\')">✎</button><button onclick="apagarProduto(\'' + id + '\')">✕</button></div></div>';
    }).join('');
  }

  function renderVendas() {
    const ids = Object.keys(vendas).sort((a,b) => (vendas[b].criado||0)-(vendas[a].criado||0));
    document.getElementById('contVendas').textContent = ids.length ? ids.length + ' vendas' : '';
    const el = document.getElementById('listaVendas');
    if (ids.length === 0) { el.innerHTML = '<div class="vazio"><span class="ic">💰</span>Nenhuma venda registrada.<br>Toque em "Nova venda" para começar.</div>'; return; }
    el.innerHTML = ids.map(id => {
      const v = vendas[id];
      const tag = v.pago ? '<span class="tag pago">Pago</span>' : '<span class="tag fiado">Fiado</span>';
      const cli = v.cliente ? v.cliente + ' · ' : '';
      return '<div class="card venda-item"><div class="info"><div class="nome">' + (v.qtd>1?v.qtd+'x ':'') + esc(v.produtoNome) + '</div>' +
        '<div class="meta">' + esc(cli) + dataFmt(v.data) + ' &nbsp; ' + tag + '</div></div>' +
        '<div class="valor">' + fmt(v.valor) + '</div>' +
        '<div class="acoes"><button onclick="apagarVenda(\'' + id + '\')" style="background:none;border:none;color:#C0A0A0;font-size:14px;cursor:pointer;padding:4px 6px;">✕</button></div></div>';
    }).join('');
  }

  function renderReceber() {

    el.innerHTML = ids.map(id => {
      const v = vendas[id];
      return '<div class="card deve-item"><div class="info"><div class="nome">' + esc(v.cliente || 'Cliente') + '</div>' +
        '<div class="meta">' + (v.qtd>1?v.qtd+'x ':'') + esc(v.produtoNome) + ' · ' + dataFmt(v.data) + '</div></div>' +
        '<div class="valor">' + fmt(v.valor) + '</div>' +
        '<button class="btn-receber" onclick="marcarRecebido(\'' + id + '\')">Recebi</button></div>';
    }).join('');
  }

  function renderEncomendas() {
    const ids = Object.keys(encomendas).sort((a,b) => {
      if ((encomendas[a].feito?1:0) !== (encomendas[b].feito?1:0)) return (encomendas[a].feito?1:0)-(encomendas[b].feito?1:0);
      return (encomendas[b].criado||0)-(encomendas[a].criado||0);
    });
    const pend = ids.filter(id => !encomendas[id].feito).length;
    document.getElementById('contEncomendas').textContent = pend ? pend + ' pendentes' : '';
    const el = document.getElementById('listaEncomendas');
    if (ids.length === 0) { el.innerHTML = '<div class="vazio"><span class="ic">🛍️</span>Nenhuma encomenda.<br>Toque em "Nova encomenda" para começar.</div>'; return; }
    el.innerHTML = ids.map(id => {
      const e = encomendas[id];
      const cli = e.cliente ? ' · ' + e.cliente : '';
      return '<div class="card enc-item ' + (e.feito?'feito':'') + '"><div class="check" onclick="toggleEncomenda(\'' + id + '\')">' + (e.feito?'✓':'') + '</div>' +
        '<div class="info"><div class="nome">' + esc(e.produto) + '</div><div class="meta">Pedido' + esc(cli) + '</div></div>' +
        '<div class="acoes"><button onclick="apagarEncomenda(\'' + id + '\')">✕</button></div></div>';
    }).join('');
  }

  function dataFmt(d) { if (!d) return ''; const p = d.split('-'); return p[2] + '/' + p[1]; }

  // ===== ACERTOS =====
  function renderAcertos() {
    // Painel do acerto atual (vendas ainda não fechadas em um acerto)
    const idsVendas = Object.keys(vendas);
    let totVendido = 0, totLucro = 0, totDevolve = 0;
    idsVendas.forEach(id => {
      const v = vendas[id];
      totVendido += (v.valor||0);
      totLucro += (v.lucro||0);
      totDevolve += (v.devolve||0);
    });
    const painel = document.getElementById('painelAcertoAtual');
    painel.innerHTML = '<h3>🤝 Acerto atual</h3>' +
      '<div class="pa-linha"><span class="lab">Vendas no período</span><span class="val">' + idsVendas.length + '</span></div>' +
      '<div class="pa-linha"><span class="lab">Total vendido</span><span class="val">' + fmt(totVendido) + '</span></div>' +
      '<div class="pa-linha lucro"><span class="lab">Seu lucro</span><span class="val">' + fmt(totLucro) + '</span></div>' +
      '<div class="pa-linha destaque"><span class="lab">Pagar à fornecedora</span><span class="val">' + fmt(totDevolve) + '</span></div>' +
      '<button class="btn-fechar-acerto" onclick="fecharAcerto()"' + (idsVendas.length === 0 ? ' disabled' : '') + '>Fechar acerto e começar novo período</button>' +
      (idsVendas.length === 0 ? '<div style="text-align:center;font-size:12px;color:var(--cinza);margin-top:10px;">Nenhuma venda para fechar ainda.</div>' : '');

    // Histórico
    const idsAcertos = Object.keys(acertos).sort((a,b) => (acertos[b].criado||0)-(acertos[a].criado||0));
    const lista = document.getElementById('listaAcertos');
    if (idsAcertos.length === 0) {
      lista.innerHTML = '<div class="vazio"><span class="ic">📖</span>Nenhum acerto fechado ainda.</div>';
      return;
    }
    lista.innerHTML = idsAcertos.map(id => {
      const a = acertos[id];
      const dt = new Date(a.criado);
      const dataTxt = String(dt.getDate()).padStart(2,'0') + '/' + String(dt.getMonth()+1).padStart(2,'0') + '/' + dt.getFullYear();
      const itens = (a.vendas || []).map(v =>
        '<div class="dv"><span>' + (v.qtd>1?v.qtd+'x ':'') + esc(v.produtoNome) + (v.cliente?' · '+esc(v.cliente):'') + '</span><span>' + fmt(v.valor) + (v.pago===false?' (fiado)':'') + '</span></div>'
      ).join('');
      return '<div class="acerto-hist"><div class="cab"><span class="data">Acerto de ' + dataTxt + '</span>' +
        '<span class="pago-forn">Pago: ' + fmt(a.devolve||0) + '</span></div>' +
        '<div class="mini">' + (a.qtdVendas||0) + ' vendas · Total ' + fmt(a.vendido||0) + ' · Lucro ' + fmt(a.lucro||0) + '</div>' +
        '<span class="ver" onclick="verDetalheAcerto(\'' + id + '\')">Ver produtos vendidos ›</span>' +
        '<div class="acerto-detalhe" id="det-' + id + '">' + (itens || '<div class="dv">Sem itens</div>') + '</div></div>';
    }).join('');
  }

  window.verDetalheAcerto = function(id) {
    document.getElementById('det-' + id).classList.toggle('show');
  };

  window.fecharAcerto = function() {
    const idsVendas = Object.keys(vendas);
    if (idsVendas.length === 0) return;
    let totVendido = 0, totLucro = 0, totDevolve = 0;
    const listaVendas = [];
    idsVendas.forEach(id => {
      const v = vendas[id];
      totVendido += (v.valor||0); totLucro += (v.lucro||0); totDevolve += (v.devolve||0);
      listaVendas.push({ produtoNome: v.produtoNome, qtd: v.qtd, valor: v.valor, cliente: v.cliente || '', pago: v.pago !== false, data: v.data });
    });
    const msg = 'Fechar este acerto?\n\n' +
      '• Total vendido: ' + fmt(totVendido) + '\n' +
      '• Seu lucro: ' + fmt(totLucro) + '\n' +
      '• Pagar à fornecedora: ' + fmt(totDevolve) + '\n\n' +
      'As vendas vão para o histórico e você começa um novo período. O estoque continua igual.';
    if (!confirm(msg)) return;
    // Salva o acerto no histórico
    acertoRef.push({ criado: Date.now(), vendido: totVendido, lucro: totLucro, devolve: totDevolve, qtdVendas: idsVendas.length, vendas: listaVendas });
    // Limpa as vendas do período atual
    vendaRef.remove();
    alert('Acerto fechado! 🌸\nVocê pagou ' + fmt(totDevolve) + ' à fornecedora.\nAgora é só adicionar os produtos novos que ela trouxe.');
    setAba('acertos');
  };

  document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if (e.target === m) fecharModais(); }));
</script>
</body>
</html>
